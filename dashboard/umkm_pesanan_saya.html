<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplier Hub - UMKM Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../auth.js"></script>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-900 selection:bg-emerald-100 selection:text-emerald-900 overflow-hidden"
  >
    <div id="app-content" class="min-h-screen flex invisible">
      <!-- Sidebar - UMKM Theme (Navy) -->
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white transition-all duration-300 transform lg:relative lg:translate-x-0 border-r border-slate-800 flex flex-col"
      >
        <div class="p-8 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center">
              <img
                src="../assets/logo.png"
                alt="Logo SupplierHub"
                class="w-12 h-12 object-contain"
              />
            </div>
            <span class="text-xl font-bold tracking-tight"
              >SUPPLIER<span class="text-emerald-400">HUB</span></span
            >
          </div>
          <button onclick="toggleSidebar()" class="lg:hidden text-slate-400">
            <i data-lucide="x"></i>
          </button>
        </div>

        <nav
          class="mt-4 px-6 space-y-1.5 flex-1 overflow-y-auto custom-scrollbar"
        >
          <p
            class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4"
          >
            UMKM MENU
          </p>
          <a
            href="umkm.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="layout-dashboard" class="text-white"></i>
            <span class="font-semibold text-sm">Dashboard</span>
          </a>
          <a
            href="katalog.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="store" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Katalog Produk</span>
          </a>
          <a
            href="umkm_pesanan_saya.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group bg-emerald-600 text-white shadow-xl shadow-emerald-900/40"
          >
            <i
              data-lucide="shopping-cart"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Pesanan Saya</span>
          </a>
          <a
            href="umkm_lacak_paket.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="truck" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Lacak Paket</span>
          </a>
          <a
            href="umkm_wishlist.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i data-lucide="heart" class="group-hover:text-emerald-400"></i>
            <span class="font-semibold text-sm">Wishlist</span>
          </a>
          <a
            href="umkm_bantuan.html"
            class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group text-slate-400 hover:bg-slate-800 hover:text-white"
          >
            <i
              data-lucide="help-circle"
              class="group-hover:text-emerald-400"
            ></i>
            <span class="font-semibold text-sm">Bantuan</span>
          </a>
        </nav>

        <div class="px-6 pb-8">
          <button
            onclick="logoutUser('../Login/login.html')"
            class="w-full flex items-center justify-between px-4 py-3 text-slate-400 hover:text-red-400 transition-colors group"
          >
            <div class="flex items-center gap-3">
              <i data-lucide="log-out" size="20"></i>
              <span class="font-semibold text-sm">Keluar Sistem</span>
            </div>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header
          class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-40"
        >
          <div class="flex items-center gap-4">
            <button
              onclick="toggleSidebar()"
              class="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"
            >
              <i data-lucide="menu"></i>
            </button>
            <div>
              <h1 class="text-xl font-bold text-slate-900 tracking-tight">
                Pesanan Saya
              </h1>
              <p class="text-xs text-slate-500 hidden md:block">
                Belanja stok kebutuhan usaha Anda.
              </p>
            </div>
          </div>
          <div class="flex items-center gap-6">
            <div
              class="hidden md:flex items-center bg-slate-50 rounded-xl px-4 py-2.5 w-72 border border-slate-200 focus-within:border-emerald-500 focus-within:bg-white focus-within:ring-4 focus-within:ring-emerald-500/5 transition-all"
            >
              <i data-lucide="search" class="text-slate-400 w-4 h-4"></i>
              <input
                type="text"
                placeholder="Cari Supplier..."
                class="bg-transparent border-none focus:ring-0 text-sm w-full ml-2 outline-none placeholder:text-slate-400 text-slate-700"
              />
            </div>
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-3 pl-2">
                <div class="text-right hidden sm:block">
                  <p
                    id="user-display-name"
                    class="text-sm font-bold text-slate-900 leading-none"
                  >
                    UMKM
                  </p>
                  <p
                    class="text-[10px] text-emerald-600 font-black uppercase tracking-widest mt-1.5"
                  >
                    Role: UMKM
                  </p>
                </div>
                <div
                  class="w-11 h-11 rounded-xl bg-emerald-50 border-2 border-white shadow-sm overflow-hidden ring-1 ring-slate-200 flex py-1 justify-center"
                >
                  <i
                    data-lucide="store"
                    class="text-emerald-600 w-7 h-7 mt-1.5"
                  ></i>
                </div>
              </div>
            </div>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
          <div
            class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8"
          >
            <div>
              <h2 class="text-2xl font-black text-slate-900 tracking-tight">
                Pesanan Saya
              </h2>
              <p class="text-slate-500 text-sm">
                Pantau status pesanan bahan baku Anda.
              </p>
            </div>
          </div>

          <div class="flex gap-2 mb-6 overflow-x-auto pb-2 custom-scrollbar">
            <button
              data-status-filter="all"
              onclick="setOrderFilter('all')"
              class="order-filter px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Semua
            </button>
            <button
              data-status-filter="pending"
              onclick="setOrderFilter('pending')"
              class="order-filter px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Pending
            </button>
            <button
              data-status-filter="processing"
              onclick="setOrderFilter('processing')"
              class="order-filter px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Diproses
            </button>
            <button
              data-status-filter="shipped"
              onclick="setOrderFilter('shipped')"
              class="order-filter px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Dikirim
            </button>
            <button
              data-status-filter="completed"
              onclick="setOrderFilter('completed')"
              class="order-filter px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Selesai
            </button>
            <button
              data-status-filter="cancelled"
              onclick="setOrderFilter('cancelled')"
              class="order-filter px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-bold whitespace-nowrap"
            >
              Batal
            </button>
          </div>

          <div id="ordersContainer" class="space-y-6">
            <p class="text-center text-slate-400 italic">
              Memuat riwayat pesanan...
            </p>
          </div>
        </div>
      </main>
    </div>

    <script>
      function toggleSidebar() {
        document
          .getElementById("sidebar")
          .classList.toggle("-translate-x-full");
      }

      let activeStatusFilter = "all";

      function getSessionToken() {
        const userSession = getStoredUserSession();
        return userSession ? userSession.token : null;
      }

      function jsArg(value) {
        return `'${String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'")}'`;
      }

      function escapeHTML(value) {
        return String(value ?? "").replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[char],
        );
      }

      function formatRupiah(value) {
        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(Number(value || 0));
      }

      function getStatusMeta(status) {
        const normalized = String(status || "").toLowerCase();
        const map = {
          pending: {
            label: "PENDING",
            color: "bg-yellow-50 text-yellow-600",
            icon: "clock",
          },
          paid: {
            label: "DIBAYAR",
            color: "bg-emerald-50 text-emerald-600",
            icon: "credit-card",
          },
          processing: {
            label: "DIPROSES",
            color: "bg-indigo-50 text-indigo-600",
            icon: "package-check",
          },
          shipped: {
            label: "DIKIRIM",
            color: "bg-blue-50 text-blue-600",
            icon: "truck",
          },
          completed: {
            label: "SELESAI",
            color: "bg-emerald-50 text-emerald-600",
            icon: "check-circle-2",
          },
          cancelled: {
            label: "BATAL",
            color: "bg-red-50 text-red-600",
            icon: "x-circle",
          },
        };
        return (
          map[normalized] || {
            label: normalized.toUpperCase() || "UNKNOWN",
            color: "bg-slate-100 text-slate-600",
            icon: "package",
          }
        );
      }

      function setOrderFilter(status) {
        activeStatusFilter = status;
        document.querySelectorAll(".order-filter").forEach((btn) => {
          const active = btn.dataset.statusFilter === status;
          btn.classList.toggle("bg-slate-900", active);
          btn.classList.toggle("text-white", active);
          btn.classList.toggle("bg-white", !active);
          btn.classList.toggle("text-slate-600", !active);
          btn.classList.toggle("border", !active);
          btn.classList.toggle("border-slate-200", !active);
        });
        fetchOrders();
      }

      function renderAction(order) {
        const orderID = jsArg(order.id);
        if (order.status === "pending") {
          return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end">
                        <button onclick="cancelOrder(${orderID})" class="px-4 py-2 bg-white border border-red-100 text-red-600 rounded-xl text-xs font-bold hover:bg-red-50 transition-colors">Batalkan</button>
                    </div>
                `;
        }
        if (order.status === "shipped" || order.status === "paid") {
          return `
                    <div class="flex flex-wrap gap-2 mt-2 justify-end">
                        <a href="umkm_lacak_paket.html" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">Lacak Paket</a>
                        <button onclick="completeOrder(${orderID})" class="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-colors">Terima</button>
                    </div>
                `;
        }
        return `
                <a href="katalog.html" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-50 transition-colors shadow-sm mt-2 inline-block">Beli Lagi</a>
            `;
      }

      function renderOrders(orders) {
        const container = document.getElementById("ordersContainer");
        container.innerHTML = "";

        if (!orders || orders.length === 0) {
          container.innerHTML =
            '<div class="text-center p-8 bg-white rounded-3xl border border-slate-100"><p class="text-slate-500 font-medium">Belum ada pesanan untuk filter ini.</p><a href="katalog.html" class="inline-block mt-4 px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold">Mulai Belanja</a></div>';
          return;
        }

        orders.forEach((order) => {
          const product = order.product || {};
          const supplier = product.supplier || {};
          const statusMeta = getStatusMeta(order.status);
          const productName = escapeHTML(product.name || "Produk");
          const supplierName = escapeHTML(supplier.business_name || "Supplier");
          const imageURL = escapeHTML(
            product.image_url || "../assets/logo.png",
          );
          const basePriceFormatted = formatRupiah(product.price);
          const priceFormatted = formatRupiah(order.grand_total);
          const shortId = String(order.id || "")
            .substring(0, 8)
            .toUpperCase();

          container.innerHTML += `
                    <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-50">
                            <div class="flex items-center gap-3">
                                <i data-lucide="store" class="text-emerald-600 w-5 h-5"></i>
                                <span class="font-bold text-slate-900">${supplierName}</span>
                            </div>
                            <span class="text-[10px] font-black px-3 py-1 rounded-full ${statusMeta.color}">${statusMeta.label}</span>
                        </div>
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="w-20 h-20 bg-slate-100 rounded-xl flex-shrink-0 flex justify-center items-center overflow-hidden">
                                <img src="${imageURL}" alt="${productName}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <i data-lucide="package" class="w-8 h-8 text-slate-300 hidden"></i>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">ORD-${shortId}</p>
                                <h4 class="font-bold text-slate-900">${productName}</h4>
                                <p class="text-sm text-slate-500 mt-1">${Number(order.quantity || 0)} x ${basePriceFormatted}</p>
                            </div>
                            <div class="text-left md:text-right flex flex-col justify-between md:items-end">
                                <div>
                                    <p class="text-xs text-slate-500 font-bold mb-1">Total Belanja</p>
                                    <p class="font-black text-emerald-600 text-lg">${priceFormatted}</p>
                                </div>
                                ${renderAction(order)}
                            </div>
                        </div>
                    </div>
                `;
        });
        lucide.createIcons();
      }

      async function fetchOrders() {
        const token = getSessionToken();
        if (!token) return;

        try {
          const url =
            activeStatusFilter === "all"
              ? buildApiUrl("/api/user/orders")
              : buildApiUrl(
                  `/api/user/orders?status=${encodeURIComponent(activeStatusFilter)}`,
                );
          const res = await fetch(url, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const result = await res.json();
          if (res.ok) {
            renderOrders(result.data || []);
          } else {
            throw new Error(result.error || "Gagal memuat pesanan");
          }
        } catch (err) {
          console.error("Gagal memuat pesanan", err);
          document.getElementById("ordersContainer").innerHTML =
            `<div class="text-center p-8 bg-white rounded-3xl border border-red-100 text-red-500 font-bold">${escapeHTML(err.message)}</div>`;
        }
      }

      async function updateOrderStatus(orderID, action) {
        const token = getSessionToken();
        if (!token) return;

        try {
          const res = await fetch(
            buildApiUrl(
              `/api/user/orders/${encodeURIComponent(orderID)}/${action}`,
            ),
            {
              method: "PUT",
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          const result = await res.json();
          if (!res.ok)
            throw new Error(result.error || "Gagal memperbarui pesanan");
          fetchOrders();
        } catch (err) {
          alert(err.message);
        }
      }

      function cancelOrder(orderID) {
        if (
          confirm("Batalkan pesanan ini? Stok akan dikembalikan ke katalog.")
        ) {
          updateOrderStatus(orderID, "cancel");
        }
      }

      function completeOrder(orderID) {
        if (confirm("Konfirmasi paket sudah diterima?")) {
          updateOrderStatus(orderID, "complete");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        const user = checkAuth("../Login/login.html");
        if (user) {
          if (user.role !== "user") {
            window.location.href = "../Login/login.html";
          } else {
            document.getElementById("user-display-name").innerText =
              user.name || user.email || "UMKM";
            const dateEl = document.getElementById("current-date");
            if (dateEl)
              dateEl.innerText = new Date().toLocaleDateString("id-ID", {
                day: "numeric",
                month: "long",
                year: "numeric",
              });
            document
              .getElementById("app-content")
              .classList.remove("invisible");
            lucide.createIcons();
            fetchOrders();
          }
        }
      });
    </script>
  </body>
</html>
